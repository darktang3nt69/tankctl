# Redis configuration file

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
save 300 10
save 60 10000

# Performance
tcp-keepalive 60
timeout 0
tcp-backlog 511
maxclients 10000

# Security
protected-mode no

# Connection handling
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit slave 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Network
bind 0.0.0.0
port 6379

# Logging
loglevel notice
logfile /data/redis.log

# Overcommit memory
vm.overcommit_memory 1 
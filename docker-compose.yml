services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: .
    command: celery -A app.core.celery worker --loglevel=info -Q commands,notifications
    env_file:
      - .env
    depends_on:
      - app
      - redis
    volumes:
      - .:/app

  celery_beat:
    build: .
    command: celery -A app.core.celery beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - app
      - redis
    volumes:
      - .:/app

  flower:
    build: .
    command: celery -A app.core.celery flower --port=5555 --basic_auth=admin:admin --unauthenticated_api=true
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - redis

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=tankctl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
x-common: &common
  restart: unless-stopped
  networks:
    - tankctl-network

services:
  postgres:
    <<: *common
    image: postgres:15-alpine
    container_name: tankctl-postgres
    environment:
      POSTGRES_DB: tankctl
      POSTGRES_USER: tankctl
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tankctl"]
      interval: 10s
      timeout: 5s
      retries: 5

  timescaledb:
    <<: *common
    image: timescale/timescaledb:latest-pg15
    container_name: tankctl-timescaledb
    environment:
      POSTGRES_DB: tankctl_telemetry
      POSTGRES_USER: tankctl
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tankctl -d tankctl_telemetry"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    <<: *common
    image: eclipse-mosquitto:latest
    container_name: tankctl-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/#' | head -n 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqttx-web:
    <<: *common
    image: emqx/mqttx-web:latest
    container_name: tankctl-mqttx-web
    ports:
      - "8083:80"
    depends_on:
      mosquitto:
        condition: service_healthy

  whatsapp-bot:
    <<: *common
    build:
      context: ./whatsapp-bot
      dockerfile: Dockerfile
    container_name: tankctl-whatsapp-bot
    volumes:
      - whatsapp_session:/app/session
    environment:
      WHATSAPP_BOT_PORT: 3001
      WHATSAPP_SESSION_PATH: /app/session
      WHATSAPP_ALLOWED_NUMBERS: ""
      CHROME_EXECUTABLE_PATH: /usr/bin/chromium
      NODE_ENV: production

  grafana:
    <<: *common
    image: grafana/grafana:latest
    container_name: tankctl-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
      GF_INSTALL_PLUGINS: grafana-worldmap-panel,grafana-piechart-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped
    depends_on:
      - timescaledb
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    <<: *common
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tankctl-backend
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_DEBUG: "false"
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
      MQTT_USERNAME: tankctl
      MQTT_PASSWORD: password
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: tankctl
      POSTGRES_USER: tankctl
      POSTGRES_PASSWORD: password
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      TIMESCALE_DB: tankctl_telemetry
      TIMESCALE_USER: tankctl
      TIMESCALE_PASSWORD: password
      APP_TIMEZONE: Asia/Kolkata
      WHATSAPP_ENABLED: "true"
      WHATSAPP_BOT_URL: http://whatsapp-bot:3001/send
      WHATSAPP_REQUEST_TIMEOUT_SECONDS: 5
      ALERTS_ENABLED: "true"
      ALERT_MIN_INTERVAL_SECONDS: 600
      ALERT_TEMPERATURE_HIGH_C: 30
      ALERT_TEMPERATURE_LOW_C: 20
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      whatsapp-bot:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3

volumes:
  postgres_data:
  timescale_data:
  mosquitto_data:
  mosquitto_logs:
  grafana_data:
  whatsapp_session:

networks:
  tankctl-network:
    driver: bridge


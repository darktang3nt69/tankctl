services:
  app:
    container_name: tankctl_app
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@tankctl_db:5432/tankctl
      - REDIS_HOST=tankctl_redis
      - REDIS_PORT=6379
      - REDIS_DB=0
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    container_name: tankctl_celery_worker
    build: .
    command: celery -A app.core.celery worker --loglevel=info -Q commands,notifications
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@tankctl_db:5432/tankctl
      - REDIS_HOST=tankctl_redis
      - REDIS_PORT=6379
      - REDIS_DB=0
    depends_on:
      - app
      - redis
    volumes:
      - .:/app

  celery_beat:
    container_name: tankctl_celery_beat
    build: .
    command: celery -A app.core.celery beat --loglevel=info
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@tankctl_db:5432/tankctl
      - REDIS_HOST=tankctl_redis
      - REDIS_PORT=6379
      - REDIS_DB=0
    depends_on:
      - app
      - redis
    volumes:
      - .:/app

  flower:
    container_name: tankctl_flower
    build: .
    command: celery -A app.core.celery flower --port=5555 --basic_auth=admin:admin --unauthenticated_api=true
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      - REDIS_HOST=tankctl_redis
      - REDIS_PORT=6379
      - REDIS_DB=0
    depends_on:
      - redis

  db:
    container_name: tankctl_db
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=tankctl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    container_name: tankctl_redis
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf

volumes:
  postgres_data:
  redis_data: